services:
  proxy:
    depends_on:
      - backend_app1
      - backend_app2
      - backend_app3

  backend_app1:
    image: alpine
    command: sh -c "apk add --no-cache socat && socat TCP-LISTEN:9000,fork,reuseaddr EXEC:cat"

  backend_app2:
    image: alpine
    command: sh -c "apk add --no-cache socat && socat TCP-LISTEN:9000,fork,reuseaddr EXEC:cat"

  backend_app3:
    image: alpine
    command: sh -c "apk add --no-cache socat && socat TCP-LISTEN:9000,fork,reuseaddr EXEC:cat"